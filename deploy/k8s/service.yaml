apiVersion: v1
kind: Service
metadata:
  name: arbitro-server
  namespace: arbitro
  labels:
    app.kubernetes.io/name: arbitro-server
    app.kubernetes.io/part-of: arbitro-io
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: arbitro-server
  ports:
    - name: broker
      port: 9898
      targetPort: broker
      protocol: TCP
