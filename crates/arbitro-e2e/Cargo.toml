[package]
name = "arbitro-e2e"
version.workspace = true
edition.workspace = true
publish = false

[dependencies]
zerocopy       = { workspace = true }
bytes          = { workspace = true }
tokio          = { workspace = true }
arbitro-proto  = { path = "../arbitro-proto" }
arbitro-engine-v2 = { workspace = true }
arbitro-store  = { path = "../arbitro-store" }
arbitro-server = { path = "../arbitro-server" }
arbitro-client = { path = "../arbitro-client" }
tempfile       = { workspace = true }


[dev-dependencies]
criterion = { workspace = true }
crossbeam-channel = "0.5"
flume = "0.11"
atomic-wait = "1"
libc = "0.2"

[target.'cfg(target_os = "linux")'.dev-dependencies]
tokio-uring = { workspace = true }

[[bench]]
name    = "throughput"
harness = false

[[bench]]
