[package]
name    = "arbitro-server"
version.workspace = true
edition.workspace = true
license.workspace = true

[[bin]]
name = "arbitro-server"
path = "src/main.rs"

[lib]
path = "src/lib.rs"

[features]
default = []
# Enables the one-shot lifecycle profiler (lifecycle_trace.rs).
# When OFF, `record()` compiles to a no-op `#[inline(always)] {}` and every
# call site is eliminated by dead-code elimination — zero instructions in
# the final binary, zero AtomicBool gate, zero cost on the hot path.
# Enable with `cargo test --features lifecycle_trace` when you need to
# profile end-to-end timings of a single message through the server.
lifecycle_trace = []

[dependencies]
arbitro-engine-v2 = { workspace = true }
arbitro-common    = { workspace = true }
arbitro-proto     = { path = "../arbitro-proto" }
arbitro-store     = { path = "../arbitro-store" }
tokio             = { workspace = true }
tracing           = { workspace = true }
tracing-subscriber = { workspace = true }
bytes             = { workspace = true }
zerocopy          = { workspace = true }
ahash             = "0.8"

[dev-dependencies]
arbitro-client = { path = "../arbitro-client" }

[[bench]]
name = "lookup_strategies"
harness = false

[[bench]]
name = "local_delta"
harness = false

[[bench]]
name = "dispatch_variants"
harness = false

[[bench]]
name = "matchentry_enrichment"
harness = false
