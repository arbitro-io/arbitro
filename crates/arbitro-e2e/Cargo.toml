harness = false

[[bench]]
name    = "fanout"
harness = false

[[bench]]
name    = "chaos"
harness = false

[[bench]]
name    = "endurance"
harness = false

[[bench]]
name    = "queue_balance"
harness = false

[[bench]]
name    = "tcp_wire"
harness = false

[[bench]]
name    = "gate"
harness = false

[[bench]]
name    = "gate_cpu"
harness = false

[[bench]]
