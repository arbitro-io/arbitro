apiVersion: apps/v1
kind: Deployment
metadata:
  name: arbitro-server
  namespace: arbitro
  labels:
    app.kubernetes.io/name: arbitro-server
    app.kubernetes.io/part-of: arbitro-io
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: arbitro-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: arbitro-server
        app.kubernetes.io/part-of: arbitro-io
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: arbitro-server
          image: ghcr.io/arbitro-io/arbitro-server:latest
          ports:
            - name: broker
              containerPort: 9898
              protocol: TCP
          envFrom:
            - configMapRef:
                name: arbitro-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          readinessProbe:
            tcpSocket:
              port: 9898
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 9898
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: arbitro-data
