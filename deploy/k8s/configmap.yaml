apiVersion: v1
kind: ConfigMap
metadata:
  name: arbitro-config
  namespace: arbitro
  labels:
    app.kubernetes.io/name: arbitro-server
    app.kubernetes.io/part-of: arbitro-io
data:
  ARBITRO_LISTEN: "0.0.0.0:9898"
  ARBITRO_SHARDS: "4"
  ARBITRO_MAX_CONNECTIONS: "10000"
  ARBITRO_DATA_DIR: "/data"
  ARBITRO_METRICS_INTERVAL: "5"
  ARBITRO_IDLE_TIMEOUT: "300"
