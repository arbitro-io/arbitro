services:
  arbitro:
    build: .
    ports:
      - "9898:9898"
    environment:
      ARBITRO_LISTEN: "0.0.0.0:9898"
      ARBITRO_MAX_CONNECTIONS: "10000"
      ARBITRO_IDLE_TIMEOUT: "300"
      ARBITRO_KEEPALIVE_INTERVAL: "30"
    volumes:
      - arbitro-data:/data
    restart: unless-stopped

volumes:
  arbitro-data:
