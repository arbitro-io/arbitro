# Minimal single-replica deployment skeleton for the arbitro broker.
#
# Arbitro is not yet clustered (Phase 3 roadmap), so this manifest
# intentionally pins replicas=1 and uses a Recreate strategy — running
# two replicas of an unclustered broker would split clients across
# divergent state. When clustering lands, switch to RollingUpdate +
# the cluster's quorum primitive.
#
# Image: replace `arbitro:latest` with a tagged immutable digest in
# production (cosign + SLSA provenance are on the roadmap, see
# TODO §7 operability).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: arbitro
  labels:
    app.kubernetes.io/name: arbitro
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: arbitro
  template:
    metadata:
      labels:
        app.kubernetes.io/name: arbitro
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: arbitro
          image: arbitro:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: broker
              containerPort: 9898
              protocol: TCP
          envFrom:
            - configMapRef:
                name: arbitro-config
          # Uncomment to wire ARBITRO_AUTH_TOKEN from a Secret:
          # env:
          #   - name: ARBITRO_AUTH_TOKEN
          #     valueFrom:
          #       secretKeyRef:
          #         name: arbitro-auth
          #         key: token
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
          # No HTTP healthcheck endpoint yet (TODO §7 operability — a
          # /healthz HTTP endpoint is on the roadmap). For now we
          # rely on TCP readiness: pod is Ready as soon as the listen
          # socket binds.
          readinessProbe:
            tcpSocket:
              port: broker
            initialDelaySeconds: 1
            periodSeconds: 5
            timeoutSeconds: 1
          livenessProbe:
            tcpSocket:
              port: broker
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          # Volume mount for the persistent journal. Wire a PVC and
          # uncomment ARBITRO_DATA_DIR in the ConfigMap to enable.
          # volumeMounts:
          #   - name: data
          #     mountPath: /var/lib/arbitro
      # volumes:
      #   - name: data
      #     persistentVolumeClaim:
      #       claimName: arbitro-data
