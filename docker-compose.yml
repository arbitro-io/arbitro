services:
  arbitro:
    build: .
    ports:
      - "9898:9898"
    environment:
      ARBITRO_LISTEN: "0.0.0.0:9898"
      ARBITRO_MAX_CONNECTIONS: "10000"
      ARBITRO_IDLE_TIMEOUT: "300"
      ARBITRO_KEEPALIVE_INTERVAL: "30"
      # M25: persistencia. El volumen `arbitro-data` apunta a /data; sin
      # esta env var el broker corre en memoria pura y los datos del
      # volumen no se usan — silently effímero.
      ARBITRO_DATA_DIR: "/data"
    volumes:
      - arbitro-data:/data
    restart: unless-stopped

volumes:
  arbitro-data:
