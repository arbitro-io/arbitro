name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

# arbitro-kit lives as a sibling crate (path = "../arbitro-kit"). The
# checkout step pulls it into a parallel path so the workspace builds.
defaults:
  run:
    working-directory: arbitro

jobs:
  # ── Quick checks (fast, fail-fast) ────────────────────────────────────
  # ── Informational gates ───────────────────────────────────────────────
  # fmt + clippy run informationally — they catch style/lint drift but
  # don't fail the build. Required gates are: unit-tests, e2e-integration,
  # e2e-persistence, bench-compile. This matches the arbitro-kit policy.
  fmt:
    name: rustfmt (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: ${{ github.workspace }}/arbitro
    steps:
      - uses: actions/checkout@v4
        with:
          path: arbitro
      - uses: actions/checkout@v4
        with:
          repository: arbitro-io/arbitro-kit
          path: arbitro-kit
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: ${{ github.workspace }}/arbitro
    steps:
      - uses: actions/checkout@v4
        with:
          path: arbitro
      - uses: actions/checkout@v4
        with:
          repository: arbitro-io/arbitro-kit
          path: arbitro-kit
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --lib --tests

  # ── Unit tests (per-crate, fast) ──────────────────────────────────────
  unit-tests:
    name: unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}/arbitro
    steps:
      - uses: actions/checkout@v4
        with:
          path: arbitro
      - uses: actions/checkout@v4
        with:
          repository: arbitro-io/arbitro-kit
          path: arbitro-kit
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --lib

  # ── E2E integration tests (no persistence) ────────────────────────────
  e2e-integration:
    name: e2e integration
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}/arbitro
    steps:
      - uses: actions/checkout@v4
        with:
          path: arbitro
      - uses: actions/checkout@v4
        with:
          repository: arbitro-io/arbitro-kit
          path: arbitro-kit
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Integration tests
        run: cargo test -p arbitro-e2e --test integration
      - name: Client ack invariants
        run: cargo test -p arbitro-e2e --test client_ack_invariants
      - name: Invariants
        run: cargo test -p arbitro-e2e --test invariants
      - name: Lifecycle flow
        run: cargo test -p arbitro-e2e --test lifecycle_flow
      - name: Shutdown
        run: cargo test -p arbitro-e2e --test shutdown

  # ── Persistence tests (separate: disk I/O, longer, isolated) ──────────
  e2e-persistence:
    name: e2e persistence
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}/arbitro
    steps:
      - uses: actions/checkout@v4
        with:
          path: arbitro
      - uses: actions/checkout@v4
        with:
          repository: arbitro-io/arbitro-kit
          path: arbitro-kit
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Persistence tests
        run: cargo test -p arbitro-e2e --test persistence -- --test-threads=1
        timeout-minutes: 10

  # ── Benches compile (no run; just ensure they don't bit-rot) ──────────
  bench-compile:
    name: benches compile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}/arbitro
    steps:
      - uses: actions/checkout@v4
        with:
          path: arbitro
      - uses: actions/checkout@v4
        with:
          repository: arbitro-io/arbitro-kit
          path: arbitro-kit
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo bench --workspace --no-run

  # ── Docker image build (musl static + scratch) ────────────────────────
  # PRs only verify the build succeeds (no push). Pushes to master/main
  # additionally publish to GHCR with `latest` + commit-SHA tags.
  docker:
    name: docker image
    runs-on: ubuntu-latest
    needs: [unit-tests]      # gate on the cheap suite first
    permissions:
      contents: read
      packages: write        # push to ghcr.io
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: arbitro
      - uses: actions/checkout@v4
        with:
          repository: arbitro-io/arbitro-kit
          path: arbitro-kit
      - uses: docker/setup-buildx-action@v3

      # Only login + push on direct pushes to master/main (not on PRs).
      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/arbitro-server
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tags=$IMAGE:latest,$IMAGE:sha-$SHA_SHORT" >> "$GITHUB_OUTPUT"
          else
            echo "tags=$IMAGE:pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi

      # The Dockerfile expects context `arbitro-io/` containing arbitro/
      # and arbitro-kit/ side-by-side — same layout as local builds.
      - name: Build (and push on master/main)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./arbitro/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
